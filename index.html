<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter</title>
  <style>
    :root {
      --bg: #f4efe7;
      --panel: rgba(255, 251, 245, 0.88);
      --panel-strong: #fffdf9;
      --line: rgba(98, 74, 52, 0.16);
      --line-strong: rgba(98, 74, 52, 0.3);
      --ink: #2f241c;
      --muted: #7a6756;
      --accent: #b0603a;
      --accent-soft: rgba(176, 96, 58, 0.12);
      --shadow: 0 24px 60px rgba(64, 43, 27, 0.12);
      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
      --font-display: "Iowan Old Style", "Book Antiqua", "Times New Roman", serif;
      --font-body: "Segoe UI", "Apple SD Gothic Neo", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: var(--font-body);
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(176, 96, 58, 0.12), transparent 28%),
        linear-gradient(160deg, #efe6d8 0%, #f7f3ed 48%, #ece3d5 100%);
      overflow: hidden;
    }

    .app {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: 100vh;
      gap: 22px;
      padding: 24px;
    }

    .sidebar,
    .workspace {
      backdrop-filter: blur(18px);
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.65);
      box-shadow: var(--shadow);
    }

    .sidebar {
      border-radius: var(--radius-xl);
      padding: 24px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      padding: 8px 10px 0;
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 38px;
      line-height: 1.05;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .new-button {
      border: 0;
      border-radius: 999px;
      padding: 14px 18px;
      background: linear-gradient(135deg, #a55334, #c37a53);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease;
      box-shadow: 0 16px 26px rgba(176, 96, 58, 0.24);
    }

    .new-button:hover {
      transform: translateY(-1px);
    }

    .section-label {
      padding: 0 10px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .doc-list {
      overflow: auto;
      padding-right: 4px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .doc-card {
      width: 100%;
      text-align: left;
      border: 1px solid transparent;
      background: var(--panel-strong);
      border-radius: 18px;
      padding: 14px 14px 13px;
      cursor: pointer;
      transition: border-color 160ms ease, transform 160ms ease, background 160ms ease;
    }

    .doc-card:hover {
      transform: translateX(2px);
      border-color: var(--line);
    }

    .doc-card.active {
      border-color: rgba(176, 96, 58, 0.32);
      background: linear-gradient(180deg, rgba(176, 96, 58, 0.1), rgba(255, 253, 249, 0.96));
    }

    .doc-title {
      margin: 0 0 6px;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .doc-meta,
    .doc-preview {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .doc-preview {
      margin-top: 7px;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      min-height: 36px;
    }

    .workspace {
      border-radius: 34px;
      width: min(100%, 900px);
      justify-self: center;
      padding: 24px;
      display: grid;
      grid-template-rows: auto auto minmax(0, 1fr);
      gap: 18px;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 4px 2px 0;
    }

    .title-wrap {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 0;
      flex: 1;
    }

    .title-input {
      width: 100%;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-family: var(--font-display);
      font-size: clamp(24px, 2.9vw, 38px);
      line-height: 1.12;
      letter-spacing: -0.035em;
      padding: 0;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .ghost-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.45);
      color: var(--ink);
      border-radius: 999px;
      padding: 11px 14px;
      font: inherit;
      font-size: 14px;
      cursor: pointer;
      transition: background 160ms ease, border-color 160ms ease;
    }

    .ghost-button:hover {
      background: rgba(255, 255, 255, 0.72);
      border-color: var(--line-strong);
    }

    .ghost-button.active {
      background: rgba(176, 96, 58, 0.14);
      border-color: rgba(176, 96, 58, 0.36);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .stat {
      background: var(--panel-strong);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-lg);
      padding: 12px 14px;
    }

    .stat-label {
      margin: 0 0 6px;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .stat-value {
      margin: 0;
      font-family: var(--font-display);
      font-size: clamp(24px, 2.5vw, 34px);
      letter-spacing: -0.05em;
    }

    .stat-input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      font: inherit;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
    }

    .stat-input:focus {
      border-color: rgba(176, 96, 58, 0.42);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .stat-help {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
    }

    .mini-button {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 4px 8px;
      font: inherit;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }

    .mini-button:hover {
      border-color: var(--line-strong);
      background: rgba(255, 255, 255, 0.9);
    }

    .mini-button.active {
      background: rgba(176, 96, 58, 0.14);
      border-color: rgba(176, 96, 58, 0.36);
    }

    .stat-help.warning {
      color: #9d3f1f;
    }

    .stat-row {
      display: flex;
      gap: 6px;
      align-items: center;
      margin-top: 6px;
    }

    .stat-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .stat-head .stat-label {
      margin: 0;
    }

    .editor-shell {
      min-height: 0;
      padding: 22px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.96), rgba(255, 252, 247, 0.98)),
        repeating-linear-gradient(
          to bottom,
          transparent 0,
          transparent 39px,
          rgba(171, 146, 122, 0.12) 39px,
          rgba(171, 146, 122, 0.12) 40px
        );
      border: 1px solid rgba(255, 255, 255, 0.75);
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
      overflow: hidden;
    }

    .editor-stack {
      position: relative;
      flex: 1;
      min-height: 0;
    }

    .editor-highlight {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--ink);
      font: 18px/2 var(--font-body);
      padding: 2px calc(6px + var(--highlight-scrollbar-width, 0px)) 2px 2px;
      tab-size: 2;
    }

    .editor-highlight.is-hidden {
      display: none;
    }

    .editor-highlight .overflow {
      background: rgba(202, 62, 38, 0.18);
      color: #892c1b;
      border-radius: 4px;
    }

    .editor {
      position: relative;
      z-index: 1;
      flex: 1;
      width: 100%;
      height: 100%;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font: 18px/2 var(--font-body);
      padding: 2px 6px 2px 2px;
      overflow: auto;
      scrollbar-gutter: stable;
      tab-size: 2;
    }

    .editor::placeholder {
      color: #aa9684;
    }

    .editor.highlight-mode {
      color: transparent;
      caret-color: var(--ink);
    }

    .empty-state {
      margin-top: auto;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 980px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 1fr;
        min-height: auto;
      }

      .sidebar,
      .workspace {
        min-height: auto;
      }

      .doc-list {
        max-height: 260px;
      }
    }

    @media (max-width: 720px) {
      .app {
        padding: 14px;
        gap: 14px;
      }

      .sidebar,
      .workspace {
        border-radius: 24px;
      }

      .workspace {
        padding: 18px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .stats {
        grid-template-columns: 1fr;
      }

      .editor-shell {
        padding: 16px;
        border-radius: 20px;
      }

      .editor {
        min-height: 52vh;
        font-size: 17px;
      }

      .editor-highlight {
        font-size: 17px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <p class="eyebrow">Writing Space</p>
        <h1>Word Counter</h1>
        <p class="subtitle">자소서에 맞춘 차분한 작업 공간입니다. 자동저장으로 초안을 쌓아 두고, 이전 글을 빠르게 다시 열 수 있습니다.</p>
      </div>

      <button class="new-button" id="newDocButton" type="button">새 글 시작하기</button>

      <div class="section-label">Saved Drafts</div>
      <div class="doc-list" id="docList"></div>
    </aside>

    <main class="workspace">
      <div class="topbar">
        <div class="title-wrap">
          <input class="title-input" id="titleInput" type="text" maxlength="80" placeholder="제목 없는 자기소개서">
          <div class="status" id="saveStatus">로컬에 자동저장됩니다.</div>
        </div>
        <div class="toolbar">
          <button class="ghost-button" id="duplicateButton" type="button">복제</button>
          <button class="ghost-button" id="deleteButton" type="button">삭제</button>
        </div>
      </div>

      <section class="stats">
        <article class="stat">
          <p class="stat-label">공백 포함</p>
          <p class="stat-value" id="countWithSpaces">0</p>
        </article>
        <article class="stat">
          <p class="stat-label">공백 제외</p>
          <p class="stat-value" id="countWithoutSpaces">0</p>
        </article>
        <article class="stat">
          <p class="stat-label">단어 수</p>
          <p class="stat-value" id="wordCount">0</p>
        </article>
        <article class="stat">
          <div class="stat-head">
            <p class="stat-label">최대 글자 수</p>
            <button class="mini-button" id="highlightOverflowToggle" type="button" aria-pressed="false">초과 강조</button>
          </div>
          <div class="stat-row">
            <input class="stat-input" id="maxLengthInput" type="number" min="1" step="1" placeholder="제한 없음">
            <button class="mini-button" id="useCurrentCountButton" type="button">현재 글자수</button>
          </div>
          <p class="stat-help" id="limitHelp">공백 포함 기준입니다. 비워두면 제한하지 않습니다.</p>
        </article>
      </section>

      <section class="editor-shell">
        <div class="editor-stack">
          <div class="editor-highlight is-hidden" id="editorHighlight" aria-hidden="true"></div>
          <textarea
            class="editor"
            id="editor"
            placeholder="지원 동기, 경험, 강점, 배운 점을 차분하게 정리해 보세요."
          ></textarea>
        </div>
        <div class="empty-state">입력할 때마다 자동으로 저장됩니다. 브라우저를 닫아도 이 기기에서는 다시 불러올 수 있습니다.</div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "wordcounter-documents-v1";
    const titleInput = document.getElementById("titleInput");
    const editor = document.getElementById("editor");
    const docList = document.getElementById("docList");
    const saveStatus = document.getElementById("saveStatus");
    const newDocButton = document.getElementById("newDocButton");
    const duplicateButton = document.getElementById("duplicateButton");
    const deleteButton = document.getElementById("deleteButton");
    const highlightOverflowToggle = document.getElementById("highlightOverflowToggle");
    const countWithSpaces = document.getElementById("countWithSpaces");
    const countWithoutSpaces = document.getElementById("countWithoutSpaces");
    const wordCount = document.getElementById("wordCount");
    const maxLengthInput = document.getElementById("maxLengthInput");
    const useCurrentCountButton = document.getElementById("useCurrentCountButton");
    const limitHelp = document.getElementById("limitHelp");
    const editorHighlight = document.getElementById("editorHighlight");

    let documents = loadDocuments();
    let currentId = documents[0]?.id || null;
    let saveTimer = null;
    let highlightOverflowEnabled = false;

    if (!documents.length) {
      const firstDoc = createDocument();
      documents = [firstDoc];
      currentId = firstDoc.id;
      persistDocuments();
    }

    render();

    titleInput.addEventListener("input", () => {
      touchCurrentDocument();
      queueSave("자동저장 대기 중...");
    });

    editor.addEventListener("input", () => {
      updateCounts(editor.value);
      syncHighlightScroll();
      touchCurrentDocument();
      queueSave("자동저장 대기 중...");
    });

    editor.addEventListener("scroll", () => {
      syncHighlightScroll();
    });

    window.addEventListener("resize", () => {
      syncHighlightScroll();
    });

    maxLengthInput.addEventListener("input", () => {
      const current = getCurrentDocument();
      if (!current) {
        return;
      }

      const value = sanitizeLimit(maxLengthInput.value);
      maxLengthInput.value = value ? String(value) : "";
      current.maxLength = value;
      updateCounts(editor.value);
      touchCurrentDocument();
      queueSave(value ? "최대 글자 수가 저장되었습니다." : "글자 수 제한이 해제되었습니다.");
    });

    useCurrentCountButton.addEventListener("click", () => {
      const current = getCurrentDocument();
      if (!current) {
        return;
      }

      const currentLength = editor.value.length;
      if (!currentLength) {
        current.maxLength = null;
        maxLengthInput.value = "";
        updateCounts(editor.value);
        saveStatus.textContent = "현재 글이 비어 있어 최대 글자 수를 설정하지 않았습니다.";
        touchCurrentDocument();
        queueSave("글자 수 제한이 해제되었습니다.");
        return;
      }

      current.maxLength = currentLength;
      maxLengthInput.value = String(currentLength);
      updateCounts(editor.value);
      touchCurrentDocument();
      queueSave("현재 글자 수를 최대값으로 저장했습니다.");
    });

    highlightOverflowToggle.addEventListener("click", () => {
      highlightOverflowEnabled = !highlightOverflowEnabled;
      applyHighlightMode();
      updateCounts(editor.value);
    });

    newDocButton.addEventListener("click", () => {
      const doc = createDocument();
      documents.unshift(doc);
      currentId = doc.id;
      persistDocuments();
      render();
      titleInput.focus();
      saveStatus.textContent = "새 글이 생성되었습니다.";
    });

    duplicateButton.addEventListener("click", () => {
      const current = getCurrentDocument();
      if (!current) {
        return;
      }

      const copy = {
        ...current,
        id: crypto.randomUUID(),
        title: current.title ? current.title + " 복사본" : "복사된 자기소개서",
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      };

      documents.unshift(copy);
      currentId = copy.id;
      persistDocuments();
      render();
      titleInput.focus();
      saveStatus.textContent = "현재 글을 복제했습니다.";
    });

    deleteButton.addEventListener("click", () => {
      if (documents.length === 1) {
        documents = [createDocument()];
        currentId = documents[0].id;
      } else {
        documents = documents.filter((doc) => doc.id !== currentId);
        currentId = documents[0].id;
      }

      persistDocuments();
      render();
      saveStatus.textContent = "글을 삭제했습니다.";
    });

    function loadDocuments() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : [];
        if (!Array.isArray(parsed)) {
          return [];
        }

        return parsed.map((doc) => ({
          ...doc,
          maxLength: sanitizeLimit(doc.maxLength)
        }));
      } catch (error) {
        return [];
      }
    }

    function persistDocuments() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(documents));
    }

    function createDocument() {
      const now = new Date();
      return {
        id: crypto.randomUUID(),
        title: "새 자기소개서",
        content: "",
        maxLength: null,
        createdAt: now.toISOString(),
        updatedAt: now.toISOString()
      };
    }

    function getCurrentDocument() {
      return documents.find((doc) => doc.id === currentId) || null;
    }

    function touchCurrentDocument() {
      const current = getCurrentDocument();
      if (!current) {
        return;
      }

      current.title = titleInput.value.trim() || "제목 없는 자기소개서";
      current.content = editor.value;
      current.updatedAt = new Date().toISOString();
      documents.sort((a, b) => new Date(b.updatedAt) - new Date(a.updatedAt));
      currentId = current.id;
      renderList();
    }

    function queueSave(message) {
      saveStatus.textContent = message;
      window.clearTimeout(saveTimer);
      saveTimer = window.setTimeout(() => {
        persistDocuments();
        renderList();
        saveStatus.textContent = "방금 자동저장되었습니다.";
      }, 500);
    }

    function render() {
      renderEditor();
      renderList();
    }

    function renderEditor() {
      const current = getCurrentDocument();
      if (!current) {
        return;
      }

      titleInput.value = current.title;
      editor.value = current.content;
      maxLengthInput.value = current.maxLength ? String(current.maxLength) : "";
      applyHighlightMode();
      updateCounts(editor.value);
      saveStatus.textContent = "로컬에 자동저장됩니다.";
    }

    function renderList() {
      docList.innerHTML = "";

      documents.forEach((doc) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "doc-card" + (doc.id === currentId ? " active" : "");
        button.innerHTML = `
          <p class="doc-title">${escapeHtml(doc.title || "제목 없는 자기소개서")}</p>
          <p class="doc-meta">${formatDate(doc.updatedAt)} · 공백 포함 ${formatNumber((doc.content || "").length)}</p>
          <p class="doc-preview">${escapeHtml(doc.content.trim() || "아직 작성된 내용이 없습니다.")}</p>
        `;

        button.addEventListener("click", () => {
          currentId = doc.id;
          render();
          saveStatus.textContent = "저장된 글을 불러왔습니다.";
        });

        docList.appendChild(button);
      });
    }

    function updateCounts(text) {
      const withSpaces = text.length;
      const withoutSpaces = text.replace(/\s/g, "").length;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      const current = getCurrentDocument();
      const limit = current ? sanitizeLimit(current.maxLength) : null;

      countWithSpaces.textContent = formatNumber(withSpaces);
      countWithoutSpaces.textContent = formatNumber(withoutSpaces);
      wordCount.textContent = formatNumber(words);
      renderHighlight(text, limit);

      if (!limit) {
        limitHelp.textContent = "공백 포함 기준입니다. 비워두면 제한하지 않습니다.";
        limitHelp.classList.remove("warning");
        return;
      }

      if (withSpaces > limit) {
        limitHelp.textContent = "최대 글자 수를 " + formatNumber(withSpaces - limit) + "자 초과했습니다.";
        limitHelp.classList.add("warning");
        return;
      }

      limitHelp.textContent = "공백 포함 기준으로 " + formatNumber(limit - withSpaces) + "자 남았습니다.";
      limitHelp.classList.remove("warning");
    }

    function sanitizeLimit(value) {
      if (value === "" || value === null || typeof value === "undefined") {
        return null;
      }

      const number = Number(value);
      if (!Number.isFinite(number) || number < 1) {
        return null;
      }

      return Math.floor(number);
    }

    function formatDate(isoString) {
      const date = new Date(isoString);
      return new Intl.DateTimeFormat("ko-KR", {
        year: "numeric",
        month: "short",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(date);
    }

    function formatNumber(value) {
      return new Intl.NumberFormat("ko-KR").format(value);
    }

    function applyHighlightMode() {
      const active = highlightOverflowEnabled;
      highlightOverflowToggle.classList.toggle("active", active);
      highlightOverflowToggle.setAttribute("aria-pressed", active ? "true" : "false");
      editor.classList.toggle("highlight-mode", active);
      editorHighlight.classList.toggle("is-hidden", !active);
      updateHighlightMetrics();
      syncHighlightScroll();
    }

    function renderHighlight(text, limit) {
      if (!highlightOverflowEnabled) {
        editorHighlight.innerHTML = "";
        return;
      }

      updateHighlightMetrics();

      if (!limit || text.length <= limit) {
        editorHighlight.innerHTML = escapeForHighlight(text);
        syncHighlightScroll();
        return;
      }

      const safeNormal = escapeForHighlight(text.slice(0, limit));
      const safeOverflow = escapeForHighlight(text.slice(limit));
      editorHighlight.innerHTML = safeNormal + "<span class=\"overflow\">" + safeOverflow + "</span>";
      syncHighlightScroll();
    }

    function syncHighlightScroll() {
      updateHighlightMetrics();
      editorHighlight.scrollTop = editor.scrollTop;
      editorHighlight.scrollLeft = editor.scrollLeft;
    }

    function updateHighlightMetrics() {
      const scrollbarWidth = Math.max(0, editor.offsetWidth - editor.clientWidth);
      editorHighlight.style.setProperty("--highlight-scrollbar-width", scrollbarWidth + "px");
    }

    function escapeForHighlight(value) {
      const safe = escapeHtml(value)
        .replace(/ /g, "&nbsp;")
        .replace(/\n$/g, "\n ");
      return safe.replace(/\n/g, "<br>");
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }
  </script>
</body>
</html>
